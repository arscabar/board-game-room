services:
  - type: web
    name: board-game-room
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.21.1
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
