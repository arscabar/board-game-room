    <pattern id="feltLines" width="42" height="42" patternUnits="userSpaceOnUse" patternTransform="rotate(22)">
      <path d="M0 0h42" stroke="#ffffff" stroke-opacity=".045" stroke-width="2"/>
    </pattern>
  </defs>
