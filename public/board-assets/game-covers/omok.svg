      <stop offset="0" stop-color="#4f301b"/>
      <stop offset=".45" stop-color="#201108"/>
      <stop offset="1" stop-color="#0d0704"/>
    </linearGradient>
    <linearGradient id="omok-board" x1="0" y1="0" x2="1" y2="1">
