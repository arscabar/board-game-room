<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="omok-title omok-desc">
  <title id="omok-title">오목 대표 이미지</title>
  <desc id="omok-desc">목재 오목판 위에 흑백 돌이 5목을 향해 이어진 자체 제작 이미지.</desc>
  <defs>
