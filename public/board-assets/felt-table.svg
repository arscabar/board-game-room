<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="green felt board game table">
  <defs>
    <radialGradient id="spot" cx="22%" cy="36%" r="58%">
      <stop offset="0" stop-color="#195f43"/>
      <stop offset="0.52" stop-color="#0f3327"/>
      <stop offset="1" stop-color="#120c08"/>
    </radialGradient>
    <linearGradient id="falloff" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#103b2d" stop-opacity="0.86"/>
      <stop offset="0.42" stop-color="#0b1711" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#120c08" stop-opacity="0.94"/>
